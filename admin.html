<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>관리자 | 경기도체육회 스포츠박스</title>
    <link rel="icon" type="image/png" href="images/01_ci.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">
                    <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="56" height="56" rx="16" fill="url(#lgGrad)"/>
                        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="18" font-weight="900" font-family="sans-serif">GS</text>
                        <defs><linearGradient id="lgGrad" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#2e7d32"/><stop offset="1" stop-color="#1565c0"/></linearGradient></defs>
                    </svg>
                </span>
                <h2>관리자 로그인</h2>
                <p>경기도체육회 스포츠박스</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="loginId" class="form-input" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPw" class="form-input" placeholder="비밀번호를 입력하세요" required>
                </div>
                <p class="login-error" id="loginError"></p>
                <button type="submit" class="btn-submit" id="loginSubmitBtn">로그인</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="admin-dashboard" id="adminDashboard" style="display:none;">
        <header class="admin-header">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <span class="logo-icon">
                        <img src="images/01_ci.png" alt="경기도체육회 로고">
                    </span>
                </a>
                <div class="admin-header-right">
                    <button type="button" class="btn-outline" id="openPasswordModalBtn">비밀번호 변경</button>
                    <button type="button" class="btn-outline" id="logoutBtn">로그아웃</button>
                </div>
            </div>
        </header>

        <div class="admin-content">
            <nav class="admin-sidebar">
                <ul>
                    <li class="active" data-menu="events">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        이벤트 관리
                    </li>
                </ul>
            </nav>

            <main class="admin-main">
                <div class="admin-view" id="viewEventList">
                    <div class="view-header">
                        <h2>이벤트 관리</h2>
                        <button type="button" class="btn-primary" id="openEventCreateBtn">+ 신규 등록</button>
                    </div>
                    <div class="event-table-wrap">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>이벤트명</th>
                                    <th>모집상태</th>
                                    <th>등록일정수</th>
                                    <th>신청건수</th>
                                    <th>관리</th>
                                </tr>
                            </thead>
                            <tbody id="eventTableBody"></tbody>
                        </table>
                    </div>
                </div>

                <div class="admin-view" id="viewEventDetail" style="display:none;">
                    <div class="view-header">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <button type="button" class="btn-back" id="backToEventListBtn">&larr; 목록으로</button>
                            <h2 id="detailEventTitle">이벤트 상세</h2>
                        </div>
                        <div id="bookingToggleWrap"></div>
                    </div>
                    <div class="detail-tabs">
                        <button type="button" class="tab-btn active" data-tab="schedules">일정 관리</button>
                        <button type="button" class="tab-btn" data-tab="reservations">신청 내역</button>
                    </div>
                    <div class="tab-content" id="tabSchedules">
                        <div class="schedule-form">
                            <h4>일정 등록</h4>
                            <div class="schedule-form-row">
                                <div class="form-group">
                                    <label>날짜</label>
                                    <input type="date" id="scheduleDate" class="form-input">
                                </div>
                                <button type="button" class="btn-primary" id="addScheduleBtn">일정 추가</button>
                            </div>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr><th>날짜</th><th>관리</th></tr>
                            </thead>
                            <tbody id="scheduleTableBody"></tbody>
                        </table>
                    </div>
                    <div class="tab-content" id="tabReservations" style="display:none;">
                        <table class="data-table">
                            <thead>
                                <tr><th>No</th><th>예약일</th><th>단체명</th><th>담당자</th><th>연락처</th><th>참여인원</th><th>신청일시</th></tr>
                            </thead>
                            <tbody id="reservationTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Event Form Modal -->
    <div class="modal-overlay" id="eventFormModal">
        <div class="modal modal-reservation modal-glass">
            <button type="button" class="modal-close" data-close-modal="eventFormModal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="modal-header">
                <div class="modal-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                <h3 id="eventFormTitle">이벤트 등록</h3>
            </div>
            <form id="eventForm">
                <input type="hidden" id="eventFormId">
                <div class="form-group" style="padding: 0 28px;">
                    <label>이벤트명 <span class="required">*</span></label>
                    <input type="text" id="eventFormName" required class="form-input" placeholder="이벤트명을 입력하세요">
                </div>
                <div class="form-group" style="padding: 0 28px;">
                    <label>설명</label>
                    <textarea id="eventFormDesc" class="form-input" rows="3" placeholder="이벤트 설명을 입력하세요"></textarea>
                </div>
                <div class="form-group" style="padding: 0 28px;">
                    <label>이미지 URL</label>
                    <input type="text" id="eventFormImage" class="form-input" placeholder="이미지 URL (비워두면 기본 이미지)">
                </div>
                <div class="form-group" style="padding: 0 28px;">
                    <label>영상 URL</label>
                    <input type="url" id="eventFormVideo" class="form-input" placeholder="https://www.youtube.com/watch?v=...">
                </div>
                <div class="form-group" style="padding: 0 28px;">
                    <label>서류 양식 URL</label>
                    <input type="url" id="eventFormDocumentTemplate" class="form-input" placeholder="https://github.com/... 또는 구글드라이브 공유링크">
                </div>
                <div style="padding: 0 28px 28px;">
                    <button type="submit" class="btn-submit" id="eventFormSubmitBtn">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Password Change Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal modal-reservation modal-glass">
            <button type="button" class="modal-close" data-close-modal="passwordModal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="modal-header">
                <div class="modal-icon purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
                <h3>비밀번호 변경</h3>
            </div>
            <form id="passwordForm">
                <div class="form-group" style="padding: 0 28px;">
                    <label>현재 비밀번호 <span class="required">*</span></label>
                    <input type="password" id="pwCurrent" required class="form-input">
                </div>
                <div class="form-group" style="padding: 0 28px;">
                    <label>새 비밀번호 <span class="required">*</span></label>
                    <input type="password" id="pwNew" required class="form-input" minlength="4">
                </div>
                <div class="form-group" style="padding: 0 28px;">
                    <label>새 비밀번호 확인 <span class="required">*</span></label>
                    <input type="password" id="pwConfirm" required class="form-input" minlength="4">
                </div>
                <p class="login-error" id="pwError" style="padding: 0 28px;"></p>
                <div style="padding: 0 28px 28px;">
                    <button type="submit" class="btn-submit" id="passwordSubmitBtn">변경하기</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
